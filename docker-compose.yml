version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: quantlytics-postgres
    environment:
      POSTGRES_DB: trading_ai
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [trading-network]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: quantlytics-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [trading-network]
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantlytics-api
    command: quantlytics-api
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://trader:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/trading_ai
      REDIS_URL: redis://redis:6379/0
      QUANTLYTICS_API_KEYS: ${QUANTLYTICS_API_KEYS:?set QUANTLYTICS_API_KEYS}
      QUANTLYTICS_CORS_ORIGINS: ${QUANTLYTICS_CORS_ORIGINS:-https://dashboard.quantlytics.io}
      QUANTLYTICS_RATE_LIMIT_PER_MINUTE: ${QUANTLYTICS_RATE_LIMIT_PER_MINUTE:-120}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [trading-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantlytics-dashboard
    command: quantlytics --mode dashboard
    environment:
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      POSTGRES_ENABLED: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: trading_ai
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      DASHBOARD_LIVE_DATA: "false"
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [trading-network]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  trading-network:
    driver: bridge
